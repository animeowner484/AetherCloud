version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///aethercloud.db
    container_name: aethercloud-backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    container_name: aethercloud-frontend

volumes:
  uploads:
